kind = "web"
previewPath = "/"
title = "Invoice Audit App"
version = "1.0.0"
id = "artifacts/invoice-audit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25679

[services.development]
run = "pnpm --filter @workspace/invoice-audit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/invoice-audit", "run", "build" ]
publicDir = "artifacts/invoice-audit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25679"
BASE_PATH = "/"
